<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Bootstrap 5.3 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/list-task.css">
    
    <!-- Favicon -->
    <link rel="shortcut icon" type="image/png" href="/assets/icons/completed-task.png">
    
    <title>Task Flow | Listas de Tarefas</title>
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-dark bg-dark-custom">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1 fs-5 fw-bold">Task Flow</span>
            <div class="navbar-nav ms-auto flex-row gap-4">
                <a class="nav-link active" href="/">Home</a>
                <a class="nav-link" href="/lists">Todas as Listas</a>
                <a class="nav-link" href="/create-list">Nova Lista</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-container">
        <div class="container-fluid py-5">
            <!-- Title -->
            <h1 class="page-title mb-5">Listas de Tarefas</h1>

            <!-- Message Alert -->
            <div id="message" class="message-alert mb-4"></div>

            <!-- Task Lists Container -->
            <div id="lists-container" class="task-lists-wrapper">
                <!-- Lists will be inserted here -->
            </div>

            <!-- New List Button -->
            <div class="mt-5">
                <a href="/create-list" class="btn btn-primary-custom btn-lg fw-bold rounded-pill px-5 py-3">
                    + Nova Lista de Tarefas
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer-custom">
        <p class="mb-0">&copy; 2026 Task Flow - Gerenciador de Listas</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/src/list-task.js"></script>
</body>

</html>
